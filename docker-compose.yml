# MyJarvis — Docker Compose
# Autor: Francisco Stanley Rodrigues Albuquerque

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-myjarvis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-myjarvis_secret}
      POSTGRES_DB: ${POSTGRES_DB:-myjarvis}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myjarvis"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    restart: "no"
    entrypoint: ["/bin/sh", "-c", "OLLAMA_HOST=http://ollama:11434 ollama pull $${OLLAMA_MODEL:-llama3.2} && ollama pull $${OLLAMA_EMBED_MODEL:-nomic-embed-text}"]
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}

  piper:
    build:
      context: ./infra/piper
    ports:
      - "5000:5000"
    volumes:
      - piper_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/voices"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  service-auth:
    build:
      context: .
      dockerfile: services/service-auth/Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-myjarvis}:${POSTGRES_PASSWORD:-myjarvis_secret}@postgres:5432/${POSTGRES_DB:-myjarvis}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ADMIN_SEED_EMAIL: ${ADMIN_SEED_EMAIL:-franciscothestanley@gmail.com}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD:-Root@password#2100}
      ADMIN_SEED_NAME: ${ADMIN_SEED_NAME:-Administrador}
      LDAP_ENABLED: ${LDAP_ENABLED:-false}
      LDAP_URL: ${LDAP_URL:-ldap://ldap:389}
      LDAP_BIND_DN: ${LDAP_BIND_DN:-}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD:-}
      LDAP_BASE_DN: ${LDAP_BASE_DN:-dc=example,dc=com}
      LDAP_USER_FILTER: ${LDAP_USER_FILTER:-(|(mail={{username}})(uid={{username}}))}
      LDAP_ADMIN_GROUP_DN: ${LDAP_ADMIN_GROUP_DN:-}
      LDAP_MOCK_USER: ${LDAP_MOCK_USER:-ldapuser}
      LDAP_MOCK_PASSWORD: ${LDAP_MOCK_PASSWORD:-ldappass}
      LDAP_MOCK_ADMIN: ${LDAP_MOCK_ADMIN:-false}
    depends_on:
      postgres:
        condition: service_healthy

  service-ai:
    build:
      context: .
      dockerfile: services/service-ai/Dockerfile
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      SEARCH_SERVICE_URL: http://service-search:3004
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
      service-search:
        condition: service_started

  service-voice:
    build:
      context: .
      dockerfile: services/service-voice/Dockerfile
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      PIPER_URL: http://piper:5000
      PIPER_VOICE: ${PIPER_VOICE:-en_GB-alan-medium.onnx}
      PIPER_LENGTH_SCALE: ${PIPER_LENGTH_SCALE:-1.08}
    depends_on:
      piper:
        condition: service_healthy

  service-search:
    build:
      context: .
      dockerfile: services/service-search/Dockerfile
    ports:
      - "3004:3004"
    environment:
      PORT: 3004

  service-notifications:
    build:
      context: .
      dockerfile: services/service-notifications/Dockerfile
    ports:
      - "3005:3005"
    environment:
      PORT: 3005

  service-media:
    build:
      context: .
      dockerfile: services/service-media/Dockerfile
    ports:
      - "3006:3006"
    environment:
      PORT: 3006
      SEARCH_SERVICE_URL: http://service-search:3004
    depends_on:
      - service-search

  service-gateway:
    build:
      context: .
      dockerfile: services/service-gateway/Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      CORS_ORIGIN: http://localhost:3100
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      AUTH_SERVICE_URL: http://service-auth:3001
      AI_SERVICE_URL: http://service-ai:3002
      VOICE_SERVICE_URL: http://service-voice:3003
      SEARCH_SERVICE_URL: http://service-search:3004
      NOTIFICATIONS_SERVICE_URL: http://service-notifications:3005
      MEDIA_SERVICE_URL: http://service-media:3006
    depends_on:
      - service-auth
      - service-ai
      - service-voice
      - service-search
      - service-notifications
      - service-media

  jarvis-web:
    build:
      context: .
      dockerfile: frontends/jarvis-web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000
    ports:
      - "3100:3100"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
    depends_on:
      - service-gateway

volumes:
  postgres_data:
  ollama_data:
  piper_data:
