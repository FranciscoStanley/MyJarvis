name: CI Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stage-1-validate:
    name: Stage 1 — Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

  stage-2-build-integration:
    name: Stage 2 — Build & Integration
    runs-on: ubuntu-latest
    needs: stage-1-validate
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Integration tests
        run: npm run test:integration

  stage-3-e2e-quality:
    name: Stage 3 — E2E & Quality Gate
    runs-on: ubuntu-latest
    needs: stage-2-build-integration
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: E2E tests
        run: npm run test:e2e -w jarvis-web
        env:
          CI: true

      - name: Dependency audit gate
        run: node scripts/ci/audit-gate.mjs
